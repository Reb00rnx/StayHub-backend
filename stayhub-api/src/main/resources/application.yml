spring:
  application:
    name: stayhub-api

  datasource:
    url: jdbc:postgresql://localhost:5432/${DB_NAME:stayhub}
    username: ${DB_USERNAME:stayhub}
    password: ${DB_PASSWORD:stayhub_password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  liquibase:
    change-log: classpath:liquibase/db.changelog-master.xml
    enabled: true

  threads:
    virtual:
      enabled: true

server:
  port: 8080

logging:
  level:
    com.stayhub: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: INFO
    org.liquibase: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

jwt:
  secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

---
spring:
  config:
    activate:
      on-profile: dev
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    com.stayhub: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

---
spring:
  config:
    activate:
      on-profile: prod
  jpa:
    show-sql: false

logging:
  level:
    com.stayhub: INFO
    org.springframework.web: WARN
